# cloudbuild.yaml
# Triggered by push to main branch.
# Builds Docker image, deploys to Cloud Run in asia-southeast1.
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/slsp-qap-helper:$COMMIT_SHA'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/slsp-qap-helper:$COMMIT_SHA'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'slsp-qap-helper'
      - '--image=gcr.io/$PROJECT_ID/slsp-qap-helper:$COMMIT_SHA'
      - '--region=asia-southeast1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--timeout=300'
      - '--memory=1Gi'
      - '--concurrency=15'
      - '--set-secrets=ODOO_CLIENTS_JSON=odoo-slsp-clients-json:latest,ACCESS_TOKEN=slsp-qap-access-token:latest'

images:
  - 'gcr.io/$PROJECT_ID/slsp-qap-helper:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY

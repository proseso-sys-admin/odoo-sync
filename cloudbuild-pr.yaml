# PR-check: validates code before merge. Does NOT deploy.
steps:
  - name: 'node:20-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd worker
        npm ci
        node --check src/index.js && echo "Syntax check passed" || echo "Warning: syntax check failed"

options:
  logging: CLOUD_LOGGING_ONLY

# Cloud Build: build worker image and deploy to Cloud Run.
# Use from GitHub trigger or: gcloud builds submit --config=worker/cloudbuild.yaml .
#
# Substitution variables (set in trigger or default below):
#   _SERVICE_NAME  - Cloud Run service name
#   _REGION        - Cloud Run region
#   _IMAGE_TAG     - Image tag (default 'latest'; in GitHub trigger set to SHORT_SHA)
# Env and secrets: configure in the Cloud Run trigger or set on the service once.

substitutions:
  _SERVICE_NAME: odoo-sync-worker
  _REGION: asia-southeast1
  _IMAGE_TAG: latest

steps:
  # Build from worker directory so context matches Dockerfile (COPY package.json, COPY src)
  - name: gcr.io/cloud-builders/docker
    id: build
    dir: worker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/odoo-sync/worker:${_IMAGE_TAG}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/odoo-sync/worker:latest
      - -f
      - Dockerfile
      - .

  # Push to Artifact Registry (create repo first: gcloud artifacts repositories create odoo-sync --repository-format=docker --location=${_REGION})
  - name: gcr.io/cloud-builders/docker
    id: push
    waitFor: [build]
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/odoo-sync/worker:${_IMAGE_TAG}

  # Deploy to Cloud Run (env and secrets must already be set on the service, or add --set-env-vars/--set-secrets here)
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    waitFor: [push]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/odoo-sync/worker:${_IMAGE_TAG}
      - --region=${_REGION}

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/odoo-sync/worker:${_IMAGE_TAG}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/odoo-sync/worker:latest

options:
  logging: CLOUD_LOGGING_ONLY
